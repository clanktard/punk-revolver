<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Pixelate</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="theme-color" content="#00ff00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pixelate">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:monospace;padding:clamp(16px,4vw,24px);max-width:500px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
h1{font-size:clamp(20px,5vw,28px);margin-bottom:4px;color:#0f0;text-align:center}
.subtitle{color:#666;font-size:clamp(11px,2.5vw,13px);text-align:center;margin-bottom:clamp(16px,4vw,24px)}
.upload{border:2px dashed #444;border-radius:16px;padding:clamp(24px,6vw,40px);text-align:center;cursor:pointer;margin-bottom:clamp(16px,4vw,24px);transition:all .2s}
.upload:hover{border-color:#0f0;background:rgba(0,255,0,0.03)}
.upload:active{border-color:#0f0;background:rgba(0,255,0,0.08)}
.upload.loading{border-color:#0f0;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.upload p{color:#888;font-size:clamp(14px,3.5vw,18px)}
.upload p span{color:#0f0;font-size:clamp(28px,7vw,36px);display:block;margin-bottom:8px}
canvas{display:none}
.editor{flex:1;display:flex;flex-direction:column}
.hidden{display:none}
.section{margin-bottom:clamp(16px,4vw,20px)}
.section-title{font-size:clamp(13px,3vw,16px);color:#0f0;margin-bottom:clamp(8px,2vw,12px);font-weight:bold}
.canvas-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2vw,12px)}
.canvas-btn{background:#1a1a1a;border:2px solid #333;border-radius:12px;padding:clamp(12px,3vw,16px) 8px;text-align:center;cursor:pointer;transition:all .2s}
.canvas-btn:hover{border-color:#0f0;background:#0a1a0a}
.canvas-btn.on{border-color:#0f0;background:#0a1a0a;box-shadow:0 0 20px rgba(0,255,0,0.2)}
.canvas-size{font-size:clamp(18px,4.5vw,24px);color:#fff;font-weight:bold;display:block}
.canvas-pts{font-size:clamp(10px,2.5vw,12px);color:#888;margin-top:4px;display:block}
.canvas-label{font-size:clamp(9px,2vw,11px);color:#666;margin-top:2px;display:block}
.pixel-control{background:#1a1a1a;border-radius:12px;padding:clamp(12px,3vw,16px)}
.pixel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:clamp(8px,2vw,12px)}
.pixel-label{font-size:clamp(12px,3vw,14px);color:#888}
.pixel-count{font-size:clamp(24px,6vw,32px);color:#0f0;font-weight:bold}
.pixel-max{font-size:clamp(11px,2.5vw,13px);color:#666;text-align:center;margin-top:4px}
input[type=range]{width:100%;height:clamp(32px,8vw,40px);cursor:pointer;accent-color:#0f0;background:#333;border-radius:8px;-webkit-appearance:none;appearance:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:clamp(24px,6vw,32px);height:clamp(24px,6vw,32px);background:#0f0;border-radius:50%;cursor:pointer;border:3px solid #111}
input[type=range]::-moz-range-thumb{width:clamp(24px,6vw,32px);height:clamp(24px,6vw,32px);background:#0f0;border-radius:50%;cursor:pointer;border:3px solid #111}
.preview-section{text-align:center;margin:clamp(12px,3vw,16px) 0}
.preview canvas{display:inline-block;image-rendering:pixelated;image-rendering:crisp-edges;border:2px solid #333;border-radius:8px;max-width:100%;height:auto}
.stats{font-size:clamp(12px,3vw,14px);color:#888;margin:clamp(8px,2vw,12px) 0;text-align:center}
.download-btns{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,2vw,12px);margin-top:auto;padding-top:clamp(12px,3vw,16px)}
.dl-btn{background:#0f0;color:#000;border:none;border-radius:12px;padding:clamp(14px,3.5vw,18px);font-family:monospace;font-weight:bold;cursor:pointer;font-size:clamp(14px,3.5vw,18px);transition:all .2s}
.dl-btn:active{transform:scale(0.95);opacity:0.8}
.dl-btn.secondary{background:#222;color:#0f0;border:2px solid #0f0}
.advanced-toggle{text-align:center;margin:clamp(8px,2vw,12px) 0}
.advanced-toggle button{background:none;border:none;color:#666;font-family:monospace;font-size:clamp(11px,2.5vw,13px);cursor:pointer;padding:8px}
.advanced-toggle button:hover{color:#0f0}
.advanced{background:#1a1a1a;border-radius:12px;padding:clamp(12px,3vw,16px);margin-bottom:clamp(12px,3vw,16px)}
.advanced label{display:block;font-size:clamp(11px,2.5vw,13px);color:#888;margin-bottom:4px;margin-top:clamp(8px,2vw,12px)}
.advanced label:first-child{margin-top:0}
.advanced input[type=range]{height:24px}
.advanced .val{color:#0f0;font-weight:bold}
.adv-row{display:flex;gap:clamp(6px,2vw,12px);margin-top:clamp(8px,2vw,12px)}
.adv-toggle{background:#333;color:#fff;border:1px solid #555;border-radius:6px;padding:6px 12px;font-family:monospace;cursor:pointer;font-size:clamp(11px,2.5vw,13px);transition:all .2s;flex:1;text-align:center}
.adv-toggle.on{background:#0f0;color:#000;border-color:#0f0}
</style>
</head><body>
<h1>⬛ PIXELATE</h1>
<p class="subtitle">Image → Pixel Art</p>

<div class="upload" id="uploadArea" onclick="document.getElementById('fileInput').click()">
  <p><span>📷</span>Upload Image</p>
</div>
<input type="file" id="fileInput" accept="image/*" style="display:none">

<div id="editor" class="editor hidden">
  <div class="section">
    <div class="section-title">Canvas Size</div>
    <div class="canvas-btns">
      <div class="canvas-btn on" data-size="24" onclick="setGridSize(24)">
        <span class="canvas-size">24×24</span>
        <span class="canvas-pts">50 pts</span>
        <span class="canvas-label">Standard</span>
      </div>
      <div class="canvas-btn" data-size="64" onclick="setGridSize(64)">
        <span class="canvas-size">64×64</span>
        <span class="canvas-pts">400 pts</span>
        <span class="canvas-label">HD</span>
      </div>
      <div class="canvas-btn" data-size="128" onclick="setGridSize(128)">
        <span class="canvas-size">128×128</span>
        <span class="canvas-pts">2,000 pts</span>
        <span class="canvas-label">Ultra</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="pixel-control">
      <div class="pixel-header">
        <span class="pixel-label">Black Pixels</span>
        <span class="pixel-count" id="darkVal">120</span>
      </div>
      <input type="range" id="darkSlider" min="10" max="576" step="1" value="120">
      <div class="pixel-max" id="pixelMax">of 576 pixels</div>
    </div>
  </div>

  <div class="preview-section">
    <div class="stats" id="stats">24×24 • 120/576 pixels (20.8%) • 50 pts</div>
    <div id="preview"></div>
  </div>

  <div class="advanced-toggle">
    <button onclick="toggleAdvanced()">⚙ Advanced Options</button>
  </div>
  <div id="advanced" class="advanced hidden">
    <label>Contrast: <span class="val" id="contrastVal">1.5</span></label>
    <input type="range" id="contrastSlider" min="0.5" max="3.0" step="0.1" value="1.5">
    
    <label>Crop Margin: <span class="val" id="cropVal">1</span>px</label>
    <input type="range" id="cropSlider" min="0" max="6" step="1" value="1">
    
    <div class="adv-row">
      <button class="adv-toggle" id="invertBtn" onclick="toggleInvert()">Invert</button>
      <button class="adv-toggle" id="gridBtn" onclick="toggleGrid()">Grid</button>
    </div>
  </div>

  <div class="download-btns">
    <button class="dl-btn" onclick="downloadPNG()">⬇ PNG</button>
    <button class="dl-btn secondary" onclick="downloadScaled()">⬇ 8× PNG</button>
  </div>
</div>

<canvas id="srcCanvas"></canvas>

<script>
let GRID = 24;
let darkBudget = 120, contrast = 1.5, cropMargin = 1, invert = false, showGrid = false;
let srcImageData = null, srcW = 0, srcH = 0;

const SIZES = {
  24: { maxDark: 576, defaultDark: 120, points: 50 },
  64: { maxDark: 4096, defaultDark: 500, points: 400 },
  128: { maxDark: 16384, defaultDark: 2000, points: 2000 }
};

function setGridSize(size) {
  GRID = size;
  const cfg = SIZES[size];
  
  document.getElementById('darkSlider').max = cfg.maxDark;
  document.getElementById('darkSlider').value = cfg.defaultDark;
  darkBudget = cfg.defaultDark;
  document.getElementById('darkVal').textContent = darkBudget;
  document.getElementById('pixelMax').textContent = 'of ' + cfg.maxDark + ' pixels';
  
  document.querySelectorAll('.canvas-btn').forEach(btn => {
    btn.classList.toggle('on', parseInt(btn.dataset.size) === size);
  });
  
  process();
}

function toggleAdvanced() {
  document.getElementById('advanced').classList.toggle('hidden');
}

function getScale() {
  const container = document.querySelector('.preview-section');
  if (!container) return 12;
  const maxW = container.clientWidth - 4;
  if (GRID <= 24) return Math.max(4, Math.min(20, Math.floor(maxW / GRID)));
  if (GRID <= 64) return Math.max(2, Math.min(8, Math.floor(maxW / GRID)));
  return Math.max(1, Math.min(4, Math.floor(maxW / GRID)));
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  if (!e.target.files[0]) return;
  document.getElementById('uploadArea').innerHTML = '<p><span>⏳</span>Processing...</p>';
  document.getElementById('uploadArea').classList.add('loading');
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      srcW = img.width; srcH = img.height;
      const c = document.getElementById('srcCanvas');
      c.width = srcW; c.height = srcH;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      srcImageData = ctx.getImageData(0, 0, srcW, srcH);
      document.getElementById('editor').classList.remove('hidden');
      document.getElementById('uploadArea').innerHTML = '<p><span>✅</span>' + srcW + '×' + srcH + ' loaded</p>';
      document.getElementById('uploadArea').classList.remove('loading');
      document.getElementById('uploadArea').style.padding = 'clamp(12px,3vw,16px)';
      process();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(e.target.files[0]);
});

document.getElementById('darkSlider').addEventListener('input', function() {
  darkBudget = parseInt(this.value);
  document.getElementById('darkVal').textContent = darkBudget;
  process();
});
document.getElementById('contrastSlider').addEventListener('input', function() {
  contrast = parseFloat(this.value);
  document.getElementById('contrastVal').textContent = contrast.toFixed(1);
  process();
});
document.getElementById('cropSlider').addEventListener('input', function() {
  cropMargin = parseInt(this.value);
  document.getElementById('cropVal').textContent = cropMargin;
  process();
});

function toggleInvert() {
  invert = !invert;
  document.getElementById('invertBtn').classList.toggle('on', invert);
  process();
}
function toggleGrid() {
  showGrid = !showGrid;
  document.getElementById('gridBtn').classList.toggle('on', showGrid);
  process();
}

function process() {
  if (!srcImageData) return;
  
  let minX = srcW, minY = srcH, maxX = 0, maxY = 0;
  const d = srcImageData.data;
  for (let y = 0; y < srcH; y++) {
    for (let x = 0; x < srcW; x++) {
      const i = (y * srcW + x) * 4;
      const gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
      if (gray < 200) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }
  
  minX = Math.max(0, minX - cropMargin);
  minY = Math.max(0, minY - cropMargin);
  maxX = Math.min(srcW - 1, maxX + cropMargin);
  maxY = Math.min(srcH - 1, maxY + cropMargin);
  
  const cropW = maxX - minX + 1;
  const cropH = maxY - minY + 1;
  
  const pixels = [];
  for (let gy = 0; gy < GRID; gy++) {
    for (let gx = 0; gx < GRID; gx++) {
      const srcX = minX + Math.floor(gx * cropW / GRID);
      const srcY = minY + Math.floor(gy * cropH / GRID);
      const i = (srcY * srcW + srcX) * 4;
      let gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
      gray = ((gray / 255 - 0.5) * contrast + 0.5) * 255;
      gray = Math.max(0, Math.min(255, gray));
      pixels.push({ gx, gy, gray });
    }
  }
  
  pixels.sort((a, b) => a.gray - b.gray);
  const darkSet = new Set();
  const limit = Math.min(darkBudget, pixels.length);
  for (let i = 0; i < limit; i++) {
    darkSet.add(pixels[i].gy * GRID + pixels[i].gx);
  }
  
  const SCALE = getScale();
  const previewCanvas = document.createElement('canvas');
  previewCanvas.width = GRID * SCALE;
  previewCanvas.height = GRID * SCALE;
  const ctx = previewCanvas.getContext('2d');
  
  ctx.fillStyle = invert ? '#000' : '#fff';
  ctx.fillRect(0, 0, GRID * SCALE, GRID * SCALE);
  
  ctx.fillStyle = invert ? '#fff' : '#000';
  for (let y = 0; y < GRID; y++) {
    for (let x = 0; x < GRID; x++) {
      if (darkSet.has(y * GRID + x)) {
        ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
      }
    }
  }
  
  if (showGrid && GRID <= 64) {
    ctx.strokeStyle = invert ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID; i++) {
      ctx.beginPath(); ctx.moveTo(i * SCALE, 0); ctx.lineTo(i * SCALE, GRID * SCALE); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * SCALE); ctx.lineTo(GRID * SCALE, i * SCALE); ctx.stroke();
    }
  }
  
  document.getElementById('preview').innerHTML = '';
  document.getElementById('preview').appendChild(previewCanvas);
  
  const pct = ((darkSet.size / (GRID * GRID)) * 100).toFixed(1);
  const pts = SIZES[GRID].points;
  document.getElementById('stats').textContent = GRID + '×' + GRID + ' • ' + darkSet.size + '/' + (GRID*GRID) + ' pixels (' + pct + '%) • ' + pts + ' pts';
}

let resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(process, 150);
});

function getProcessPixels() {
  const d = srcImageData.data;
  let minX = srcW, minY = srcH, maxX = 0, maxY = 0;
  for (let y = 0; y < srcH; y++) {
    for (let x = 0; x < srcW; x++) {
      const i = (y * srcW + x) * 4;
      const gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
      if (gray < 200) {
        if (x < minX) minX = x; if (y < minY) minY = y;
        if (x > maxX) maxX = x; if (y > maxY) maxY = y;
      }
    }
  }
  minX = Math.max(0, minX - cropMargin); minY = Math.max(0, minY - cropMargin);
  maxX = Math.min(srcW - 1, maxX + cropMargin); maxY = Math.min(srcH - 1, maxY + cropMargin);
  const cropW = maxX - minX + 1, cropH = maxY - minY + 1;
  const pixels = [];
  for (let gy = 0; gy < GRID; gy++) {
    for (let gx = 0; gx < GRID; gx++) {
      const srcX = minX + Math.floor(gx * cropW / GRID);
      const srcY = minY + Math.floor(gy * cropH / GRID);
      const i = (srcY * srcW + srcX) * 4;
      let gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
      gray = ((gray / 255 - 0.5) * contrast + 0.5) * 255;
      gray = Math.max(0, Math.min(255, gray));
      pixels.push({ gx, gy, gray });
    }
  }
  pixels.sort((a, b) => a.gray - b.gray);
  return pixels;
}

function downloadPNG() {
  if (!srcImageData) return;
  const c = document.createElement('canvas');
  c.width = GRID; c.height = GRID;
  const ctx = c.getContext('2d');
  ctx.fillStyle = invert ? '#000' : '#fff';
  ctx.fillRect(0, 0, GRID, GRID);
  ctx.fillStyle = invert ? '#fff' : '#000';
  const pixels = getProcessPixels();
  for (let i = 0; i < Math.min(darkBudget, pixels.length); i++) {
    ctx.fillRect(pixels[i].gx, pixels[i].gy, 1, 1);
  }
  const a = document.createElement('a');
  a.download = 'pixel-' + GRID + 'x' + GRID + '.png';
  a.href = c.toDataURL('image/png');
  a.click();
}

function downloadScaled() {
  if (!srcImageData) return;
  const S = 8;
  const c = document.createElement('canvas');
  c.width = GRID * S; c.height = GRID * S;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = invert ? '#000' : '#fff';
  ctx.fillRect(0, 0, GRID * S, GRID * S);
  ctx.fillStyle = invert ? '#fff' : '#000';
  const pixels = getProcessPixels();
  for (let i = 0; i < Math.min(darkBudget, pixels.length); i++) {
    ctx.fillRect(pixels[i].gx * S, pixels[i].gy * S, S, S);
  }
  const a = document.createElement('a');
  a.download = 'pixel-' + GRID + 'x' + GRID + '-8x.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body></html>
